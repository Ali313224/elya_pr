<!DOCTYPE html>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 50px 10px;
}

/* Entry Animation */
.container {
    animation: enter 1.5s ease forwards;
    opacity: 0;
    transform: scale(0.8);
}

@keyframes enter {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* Name */
.name {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 0 0 10px white, 0 0 20px white;
}

/* Sub Text */
.sub-text {
    font-size: 14px;
    margin-bottom: 15px;
    opacity: 0.8;
}

/* Spotify Icon + Song Name */
.spotify {
    font-size: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 15px;
}

.spotify i {
    margin-right: 8px;
}

/* Socials */
.socials a {
    margin: 0 8px;
    font-size: 28px;
    text-decoration: none;
}

.instagram { color: #E1306C; }
.tiktok { color: #25F4EE; }
.discord { color: #5865F2; }

/* Views */
.views {
    margin-top: 15px;
    opacity: 0.7;
}

/* Phrase under ELYA */
.phrase {
    margin-top: 15px;
    font-size: 16px;
    line-height: 1.5;
}

/* Responsive */
@media screen and (max-width: 400px){
    .name { font-size: 24px; }
    .socials a { font-size: 22px; margin: 5px; }
    .spotify { font-size: 14px; }
    .phrase { font-size: 14px; }
}
</style>
</head>
