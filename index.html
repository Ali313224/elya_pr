<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELYA</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 50px 10px;
}

/* Entry Animation */
.container {
    animation: enter 1.5s ease forwards;
    opacity: 0;
    transform: scale(0.8);
}

@keyframes enter {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* Neon Glow on Text Only */
.glow-text {
    color: #fff;
    text-shadow:
        0 0 3px #fff,
        0 0 6px #fff,
        0 0 10px #fff;
    animation: neonPulse 1.5s infinite alternate;
}

@keyframes neonPulse {
    from { text-shadow: 0 0 2px #fff, 0 0 4px #fff, 0 0 8px #fff; }
    to { text-shadow: 0 0 4px #fff, 0 0 8px #fff, 0 0 12px #fff; }
}

/* Card without Neon */
.card {
    display: inline-block;
    padding: 20px 25px;
    border-radius: 15px;
    border: 2px solid #000; /* Black border */
    background: black;
}

/* Name */
.name {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* Sub Text */
.sub-text {
    font-size: 14px;
    margin-bottom: 15px;
    opacity: 0.8;
}

/* Spotify Icon + Song Name */
.spotify {
    font-size: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 15px;
}

.spotify i {
    margin-right: 8px;
    color: #fff; /* Icon white without glow */
}

/* Socials */
.socials a {
    margin: 0 8px;
    font-size: 28px;
    text-decoration: none;
    color: #fff; /* White icons, no glow */
}

/* Views */
.views {
    margin-top: 15px;
    opacity: 0.7;
}

/* Phrase under ELYA */
.phrase {
    margin-top: 15px;
    font-size: 16px;
    line-height: 1.5;
}

/* Responsive */
@media screen and (max-width: 400px){
    .name { font-size: 24px; }
    .socials a { font-size: 22px; margin: 5px; }
    .spotify { font-size: 14px; }
    .phrase { font-size: 14px; }
}
</style>
</head>
<body>

<!-- Hidden YouTube Player -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/04uX3W7nQAw?autoplay=1&loop=1&playlist=04uX3W7nQAw"
frameborder="0" allow="autoplay">
</iframe>

<div class="container">
    <div class="card">
        <div class="name glow-text">𝐄𝐋𝐘𝐀</div>

        <div class="sub-text glow-text">
            Owner Discord Since 2017 <br>
            Owner JN DO H5 999 AH HA
        </div>

        <div class="spotify">
            <i class="fab fa-spotify"></i> <span class="glow-text">الحب الأعمى</span>
        </div>

        <div class="socials">
            <a href="https://www.instagram.com/elya_m_313"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@elya_a_313"><i class="fab fa-tiktok"></i></a>
            <a href="https://discordapp.com/users/1130317977158426654"><i class="fab fa-discord"></i></a>
        </div>

        <div class="views glow-text">👁 +100K</div>

        <div class="phrase glow-text">
            عش ما شئت فإنك ميت، وأحبب من شئت فإنك مفارق.
        </div>
    </div>
</div>

</body>
</html>
