<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELYA</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 50px 10px;
}

/* Entry Animation */
.container {
    animation: enter 1.5s ease forwards;
    opacity: 0;
    transform: scale(0.8);
}

@keyframes enter {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* Card with black border */
.card {
    display: inline-block;
    padding: 20px 25px;
    border-radius: 15px;
    border: 2px solid #000; /* black border */
    background: black;
}

/* Text elements white */
.name, .sub-text, .spotify span, .views, .phrase {
    color: #fff;
}

/* Name */
.name {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* Sub Text */
.sub-text {
    font-size: 14px;
    margin-bottom: 15px;
    opacity: 0.9;
}

/* Spotify Icon + Song Name */
.spotify {
    font-size: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 15px;
}

.spotify i {
    margin-right: 8px;
    color: #1DB954; /* Spotify green icon */
}

/* Socials */
.socials a {
    margin: 0 8px;
    font-size: 28px;
    text-decoration: none;
}

.socials a.instagram i { color: #E1306C; }
.socials a.tiktok i { color: #25F4EE; }
.socials a.discord i { color: #5865F2; }

/* Views */
.views {
    margin-top: 15px;
    opacity: 0.9;
}

/* Phrase under ELYA */
.phrase {
    margin-top: 15px;
    font-size: 16px;
    line-height: 1.5;
}

/* Play Button */
.play-btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #1DB954; /* Spotify green for visibility */
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
}

/* Responsive */
@media screen and (max-width: 400px){
    .name { font-size: 24px; }
    .socials a { font-size: 22px; margin: 5px; }
    .spotify { font-size: 14px; }
    .phrase { font-size: 14px; }
    .play-btn { font-size: 14px; padding: 8px 16px; }
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="name">𝐄𝐋𝐘𝐀</div>

        <div class="sub-text">
            Owner Discord Since 2017 <br>
            Owner JN DO H5 999 AH HA
        </div>

        <div class="spotify">
            <i class="fab fa-spotify"></i> <span>الحب الأعمى</span>
        </div>

        <div class="socials">
            <a href="https://www.instagram.com/elya_m_313" class="instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@elya_a_313" class="tiktok"><i class="fab fa-tiktok"></i></a>
            <a href="https://discordapp.com/users/1130317977158426654" class="discord"><i class="fab fa-discord"></i></a>
        </div>

        <div class="views">👁 +100K</div>

        <div class="phrase">
            عش ما شئت فإنك ميت، وأحبب من شئت فإنك مفارق.
        </div>

        <!-- Play Button -->
        <a href="https://www.youtube.com/watch?v=04uX3W7nQAw" target="_blank" class="play-btn">تشغيل الأغنية</a>
    </div>
</div>

</body>
</html>
