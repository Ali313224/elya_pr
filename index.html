<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELYA</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
    background: black;
}

/* Entry Animation */
.container {
    animation: enter 1.5s ease forwards;
    opacity: 0;
    transform: scale(0.8);
    filter: blur(10px);
}

@keyframes enter {
    to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
    }
}

/* Video Background */
.bg-video {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index: 0;
}

.bg-video video {
    width:100%;
    height:100%;
    object-fit:cover;
    filter: brightness(0.5);
}

/* Card */
.card {
    position: relative;
    z-index: 2;
    margin: 50px auto;
    padding: 20px;
    width: 90%;
    max-width: 350px;
    background: rgba(0,0,0,0.75);
    border-radius: 20px;
    box-shadow: 0 0 25px white;
    text-align: center;
}

/* Profile + Wings */
.profile {
    position: relative;
    display: inline-block;
    margin-bottom: 10px;
}

.profile img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 0 15px white;
    z-index: 2;
    position: relative;
    object-fit: cover;
}

/* Wings */
.wing {
    position: absolute;
    top: 0;
    width: 100px;
    opacity: 0.8;
    animation: wingMove 3s infinite ease-in-out;
}

.left-wing { left: -60px; }
.right-wing { right: -60px; transform: scaleX(-1); }

@keyframes wingMove {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Glow */
.glow {
    text-shadow: 0 0 10px white, 0 0 20px white;
}

/* Name */
.name {
    font-size: 28px;
    margin: 10px 0;
    word-break: break-word;
}

/* Sub Text */
.sub-text {
    font-size: 14px;
    margin-top: 5px;
    margin-bottom: 10px;
    opacity: 0.8;
}

/* Spotify Song */
.spotify {
    margin: 10px 0;
}

.spotify i {
    animation: spin 2s linear infinite;
    margin-right: 8px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Socials */
.socials a {
    margin: 8px;
    font-size: 24px;
    text-decoration: none;
}

.instagram { color: #E1306C; }
.tiktok { color: #25F4EE; }
.discord { color: #5865F2; }

/* Views */
.views {
    margin-top: 10px;
    opacity: 0.7;
}

/* Phrase under ELYA */
.phrase {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.9;
}

/* Responsive */
@media screen and (max-width: 400px){
    .profile img { width: 80px; height: 80px; }
    .wing { width: 80px; }
    .left-wing { left: -50px; }
    .right-wing { right: -50px; }
    .name { font-size: 24px; }
    .socials a { font-size: 20px; margin: 5px; }
    .card { padding: 15px; }
}
</style>
</head>

<body>

<!-- Background Video -->
<div class="bg-video">
    <video autoplay muted loop playsinline>

</div>

<div class="container">

    <img src="https://i.pinimg.com/originals/7g/pu/4x/7gpu4xgaJ.jpg" alt="ELYA">
</div>
